<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Censos</title>

  <link rel="stylesheet" href="/css/censos.css">
</head>
<body>

<header>

  <img src="/img/logo.png" class="logo">

  <nav>
    <a href="index.html">Inicio</a>
    <a href="mascotas.html">Mascotas</a>
    <a href="personas.html">Dueños</a>
    <a href="censos.html">Censos</a>
  </nav>

</header>

<div class="container">

  <h1>Registro de Censo</h1>

  <form>

    <select>
      <option>Seleccionar Mascota</option>
      <option>1</option>
      <option>2</option>
    </select>

    <select>
      <option>Seleccionar Dueño</option>
      <option>1</option>
      <option>2</option>
    </select>

    <input type="file">

    <div class="map-section">

      <h3>Ubicación del Censo</h3>

      <div class="fake-map">

        <div class="map-overlay">
          <span>Selecciona la ubicación</span>
        </div>

      </div>

    </div>

    <textarea placeholder="Observaciones"></textarea>

    <button type="submit">Guardar Censo</button>

  </form>

</div>

</body>
</html>
