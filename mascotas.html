<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Mascotas</title>

  <link rel="stylesheet" href="/css/mascotas_style.css">
</head>
<body>

<header>

  <img src="/img/logo.png" class="logo">

  <nav>
    <a href="index.html">Inicio</a>
    <a href="mascotas.html">Mascotas</a>
    <a href="personas.html">Dueños</a>
    <a href="censos.html">Censos</a>
  </nav>

</header>

<div class="container">

  <h1>Registro de Mascotas</h1>

  <form>

    <input type="text" placeholder="Nombre de la mascota">

    <select>
      <option>Seleccione tipo</option>
      <option>Perro</option>
      <option>Gato</option>
      <option>Ave</option>
    </select>

    <select>
      <option>Seleccione género</option>
      <option>Macho</option>
      <option>Hembra</option>
    </select>

    <input type="number" placeholder="Edad">

    <input type="file">

    <button type="submit">Guardar Mascota</button>

  </form>

</div>

</body>
</html>
