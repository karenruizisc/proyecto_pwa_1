<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Mascotas</title>

  <link rel="stylesheet" href="/css/mascotas_style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <header>

    <img src="/img/logo.png" class="logo">

    <nav>
      <a href="index.html">Inicio</a>
      <a href="mascotas.html">Mascotas</a>
      <a href="personas.html">Dueños</a>
      <a href="censos.html">Censos</a>
    </nav>

  </header>

  <div class="container">

    <h1>Registro de Mascotas</h1>

    <form>

      <input type="text" placeholder="Nombre de la mascota">

      <select>
        <option>Seleccione tipo</option>
        <option>Perro</option>
        <option>Gato</option>
        <option>Ave</option>
      </select>

      <select>
        <option>Seleccione género</option>
        <option>Macho</option>
        <option>Hembra</option>
      </select>

      <input type="number" placeholder="Edad">

    </form>

    <div class="d-flex flex-column align-items-center my-4">
      <div class="mb-2">
        <select id="cameraSelect" class="form-select">
          <option value="user">Cámara frontal</option>
          <option value="environment">Cámara trasera</option>
        </select>
      </div>
      <button id="btnCamara" class="btn btn-secondary mb-2">Abrir cámara</button>
      <video id="video" width="320" height="240" autoplay
        style="display:none; border:1px solid #ccc; border-radius:8px;"></video>
      <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
      <img id="foto" alt="Foto tomada"
        style="display:none; max-width:320px; border:1px solid #ccc; border-radius:8px; margin-top:10px;" />
      <button id="btnFoto" class="btn btn-primary mt-2" style="display:none;">Tomar foto</button>
    </div>

    <div class="d-flex flex-column align-items-center my-4">
      <button type="submit">Guardar Mascota</button>
    </div>


    <script src="photo.js"></script>
  </div>

</body>

</html>
